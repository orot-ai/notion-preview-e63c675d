.app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }

/* Sidebar */
.sidebar { background: #0f172a; color: #e2e8f0; padding: 24px 16px; overflow-y: auto; }
.brand { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; padding: 0 4px; }
.brand-logo { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #6366f1, #a855f7); display: grid; place-items: center; font-size: 20px; }
.brand-name { font-weight: 700; font-size: 16px; }
.brand-sub { font-size: 11px; color: #94a3b8; margin-top: 2px; }
.section-label { font-size: 11px; font-weight: 600; color: #64748b; letter-spacing: 0.05em; text-transform: uppercase; padding: 0 8px; margin: 16px 0 8px; }
.proj-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; border-radius: 8px; color: #cbd5e1; font-size: 14px; text-align: left; transition: background 0.15s; }
.proj-btn:hover { background: rgba(255,255,255,0.04); }
.proj-btn.active { background: rgba(99,102,241,0.15); color: #fff; }
.proj-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.proj-dot.blue { background: #3b82f6; }
.proj-dot.purple { background: #a855f7; }
.proj-dot.pink { background: #ec4899; }
.proj-dot.green { background: #10b981; }
.proj-dot.orange { background: #f97316; }
.proj-dot.gray { background: #64748b; }
.proj-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.proj-count { font-size: 11px; color: #94a3b8; background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 10px; }

/* Main */
.main { overflow-y: auto; padding: 32px 40px; }
.page-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; }
.page-title { font-size: 24px; font-weight: 700; }
.page-sub { color: #64748b; font-size: 13px; margin-top: 4px; }
.summary { display: flex; gap: 12px; }
.summary-chip { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 16px; font-size: 13px; }
.summary-chip b { font-size: 18px; margin-right: 6px; }
.summary-chip.warn b { color: #ef4444; }
.summary-chip.ok b { color: #6366f1; }

/* Tabs */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid #e2e8f0; margin-bottom: 24px; }
.tab { padding: 10px 16px; font-size: 14px; color: #64748b; border-bottom: 2px solid transparent; font-weight: 500; }
.tab.active { color: #6366f1; border-bottom-color: #6366f1; }
.tab-badge { margin-left: 6px; background: #f1f5f9; color: #475569; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.tab.active .tab-badge { background: #eef2ff; color: #6366f1; }

/* Task cards */
.task-list { display: flex; flex-direction: column; gap: 8px; }
.task { display: flex; align-items: center; gap: 12px; background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 16px; transition: all 0.15s; }
.task:hover { border-color: #c7d2fe; box-shadow: 0 2px 8px rgba(99,102,241,0.08); }
.task.done { opacity: 0.6; }
.task.done .task-title { text-decoration: line-through; color: #94a3b8; }
.check { width: 20px; height: 20px; border: 2px solid #cbd5e1; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; padding: 0; font-size: 12px; line-height: 1; font-weight: 700; color: transparent; background: #fff; }
.check:hover { border-color: #6366f1; }
.check.on { background: #6366f1; border-color: #6366f1; color: #fff; }
.task-body { flex: 1; min-width: 0; }
.task-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.task-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #64748b; }
.task-proj { display: inline-flex; align-items: center; gap: 4px; }
.task-due { color: #475569; }
.task-due.overdue { color: #ef4444; font-weight: 600; }
.pri { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.pri.high { background: #fee2e2; color: #dc2626; }
.pri.mid { background: #fef3c7; color: #d97706; }
.pri.low { background: #e0e7ff; color: #4f46e5; }
.progress { width: 60px; height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden; }
.progress-bar { height: 100%; background: #6366f1; transition: width 0.3s; }
.empty { text-align: center; padding: 60px 20px; color: #94a3b8; background: #fff; border: 1px dashed #e2e8f0; border-radius: 12px; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }

/* Source banner */
.source { display: inline-block; font-size: 11px; color: #64748b; background: #f1f5f9; padding: 4px 10px; border-radius: 6px; margin-top: 8px; }
.source.live { background: #dcfce7; color: #15803d; }

/* View tabs in sidebar share .proj-btn */

/* Outline view */
.outline { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 16px; }
.outline-group { margin-bottom: 20px; }
.outline-proj { font-weight: 700; font-size: 15px; padding: 10px 8px; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; border-radius: 6px; }
.outline-proj:hover { background: #f8fafc; }
.outline-proj .outline-meta { margin-left: auto; font-size: 11px; color: #94a3b8; font-weight: 500; }
.outline-row { display: flex; align-items: center; gap: 8px; padding: 8px 4px; padding-left: 28px; border-top: 1px solid #f1f5f9; }
.outline-row.indent { padding-left: 56px; background: #fafafa; }
.outline-row.done .outline-title { text-decoration: line-through; color: #94a3b8; }
.outline-toggle { width: 14px; cursor: pointer; color: #94a3b8; font-size: 10px; }
.outline-title { flex: 1; font-size: 13px; cursor: pointer; }
.outline-meta { font-size: 11px; color: #94a3b8; }

/* Gantt */
.gantt { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; overflow-x: auto; }
.gantt-table { display: inline-block; min-width: 100%; }
.gantt-header { display: flex; border-bottom: 1px solid #e2e8f0; background: #f8fafc; }
.gantt-spacer { width: 220px; flex-shrink: 0; border-right: 1px solid #e2e8f0; padding: 10px 12px; font-size: 11px; color: #64748b; font-weight: 600; }
.gantt-day { width: 40px; flex-shrink: 0; padding: 8px 4px; text-align: center; font-size: 10px; color: #64748b; border-right: 1px solid #f1f5f9; }
.gantt-day.weekend { background: #f1f5f9; }
.gantt-day.today { background: #eef2ff; color: #6366f1; font-weight: 700; }
.gantt-row { display: flex; align-items: center; height: 38px; border-bottom: 1px solid #f8fafc; }
.gantt-label { width: 220px; padding: 0 12px; font-size: 12px; flex-shrink: 0; border-right: 1px solid #e2e8f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.gantt-track { display: flex; flex: 1; position: relative; height: 100%; }
.gantt-cell { width: 40px; flex-shrink: 0; border-right: 1px solid #f8fafc; }
.gantt-cell.weekend { background: #fafafa; }
.gantt-bar { position: absolute; top: 9px; height: 20px; border-radius: 4px; padding: 0 6px; font-size: 10px; color: #fff; line-height: 20px; overflow: hidden; cursor: pointer; white-space: nowrap; text-overflow: ellipsis; }
.gantt-bar.high { background: #ef4444; }
.gantt-bar.mid { background: #f59e0b; }
.gantt-bar.low { background: #6366f1; }
.gantt-bar.done { opacity: 0.4; }

/* Calendar */
.cal { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #f1f5f9; }
.cal-month { font-size: 16px; font-weight: 700; }
.cal-nav-btn { padding: 4px 12px; border: 1px solid #e2e8f0; border-radius: 6px; background: #fff; font-size: 12px; }
.cal-head { display: grid; grid-template-columns: repeat(7, 1fr); background: #f8fafc; }
.cal-dow { padding: 8px; text-align: center; font-size: 11px; font-weight: 600; color: #64748b; border-right: 1px solid #f1f5f9; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
.cal-cell { min-height: 92px; border-right: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; padding: 4px; }
.cal-cell.other { background: #fafafa; color: #cbd5e1; }
.cal-cell.today { background: #eef2ff; }
.cal-day { font-size: 11px; font-weight: 600; margin-bottom: 4px; }
.cal-task { font-size: 10px; padding: 2px 5px; background: #e0e7ff; color: #4338ca; border-radius: 3px; margin-bottom: 2px; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cal-task.done { background: #dcfce7; color: #166534; }
.cal-task.high { background: #fee2e2; color: #b91c1c; }

/* Detail panel + buttons */
.detail-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.4); z-index: 99; }
.detail { position: fixed; top: 0; right: 0; width: 420px; height: 100vh; background: #fff; box-shadow: -8px 0 24px rgba(0,0,0,0.08); padding: 24px; overflow-y: auto; z-index: 100; }
.detail-close { position: absolute; top: 16px; right: 16px; font-size: 18px; color: #64748b; background: none; border: none; }
.detail h3 { font-size: 18px; margin-bottom: 16px; padding-right: 30px; }
.detail-field { margin-bottom: 12px; }
.detail-label { font-size: 11px; color: #64748b; margin-bottom: 4px; display: block; }
.detail-input, .detail-select { width: 100%; padding: 8px 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; font-family: inherit; box-sizing: border-box; }
.detail-input:focus, .detail-select:focus { outline: none; border-color: #6366f1; }
.detail-actions { display: flex; gap: 8px; margin-top: 24px; }
.btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; font-family: inherit; }
.btn-primary { background: #6366f1; color: #fff; }
.btn-danger { background: #fff; color: #ef4444; border: 1px solid #ef4444; }
.btn-secondary { background: #fff; color: #64748b; border: 1px solid #e2e8f0; }
.add-btn { background: #6366f1; color: #fff; padding: 8px 14px; border-radius: 6px; font-size: 13px; border: none; cursor: pointer; margin-top: 16px; width: 100%; }

/* Toast */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #0f172a; color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 13px; z-index: 200; }
.toast.error { background: #ef4444; }
.toast.success { background: #10b981; }

/* Dynamic helpers */
.view-label { font-size: 14px; color: #94a3b8; font-weight: 400; margin-left: 8px; }
.overdue-count { color: #ef4444; }

/* Sidebar relative (for absolute user menu) */
.sidebar { position: relative; }

/* Mindmap — 가로 트리 (카드 + 엘보 커넥터) */
.mindmap-wrap { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; overflow: auto; max-height: 720px; position: relative; }
.mm-legend { padding: 8px 14px; font-size: 11px; color: #64748b; background: #fff; border-bottom: 1px solid #f1f5f9; position: sticky; top: 0; z-index: 3; }
.mindmap-canvas { position: relative; padding: 8px 0; }
.mm-lines { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
.mm-card { position: absolute; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 10px; font-size: 12px; box-shadow: 0 1px 2px rgba(15,23,42,0.05); cursor: pointer; transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s; z-index: 2; box-sizing: border-box; }
.mm-card:hover { border-color: #6366f1; box-shadow: 0 6px 18px rgba(99,102,241,0.2); transform: translateY(-1px); }
.mm-card.done { opacity: 0.55; background: #fafafa; }
.mm-card.high { border-color: #fca5a5; }
.mm-card.high:hover { border-color: #ef4444; }
.mm-root-card { background: linear-gradient(135deg, #f97316, #ea580c); color: #fff; border: none; text-align: center; padding: 16px 14px; cursor: default; }
.mm-root-card:hover { transform: none; box-shadow: 0 6px 18px rgba(249,115,22,0.35); border: none; }
.mm-root-label { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }
.mm-root-sub { font-size: 11px; opacity: 0.9; margin-top: 3px; }
.mm-project-card { background: #fffbeb; border-color: #fde68a; }
.mm-project-card:hover { border-color: #f59e0b; }
.mm-card-head { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.mm-card-check { width: 14px; height: 14px; border: 1.5px solid #cbd5e1; border-radius: 3px; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; color: transparent; background: #fff; padding: 0; flex-shrink: 0; cursor: pointer; line-height: 1; font-weight: 700; }
.mm-card-check:hover { border-color: #10b981; }
.mm-card-check.on { background: #10b981; border-color: #10b981; color: #fff; }
.mm-card-title { flex: 1; font-size: 12px; font-weight: 500; color: #0f172a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mm-card-title.strike { text-decoration: line-through; color: #94a3b8; font-weight: 400; }
.mm-card-meta { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #64748b; }
.mm-card-date { flex-shrink: 0; }
.mm-card-progress { flex: 1; height: 3px; background: #e2e8f0; border-radius: 2px; overflow: hidden; min-width: 28px; }
.mm-card-progress-bar { height: 100%; background: #6366f1; transition: width 0.3s; }
.mm-card-progress-bar.done { background: #10b981; }
.mm-card-pct { font-size: 10px; color: #94a3b8; flex-shrink: 0; min-width: 28px; text-align: right; }
.mm-card-assignee { margin-top: 5px; font-size: 10px; color: #64748b; padding-top: 4px; border-top: 1px dashed #f1f5f9; }
.mm-link-path { fill: none; stroke: #cbd5e1; stroke-width: 1.5; }
.mm-link-path.high { stroke: #fb923c; stroke-width: 2; }
.mm-link-path.done { stroke: #94a3b8; stroke-dasharray: 4 4; }

/* 인라인 CRUD 액션 (모든 뷰 공통) */
.row-del { opacity: 0; padding: 4px 8px; font-size: 14px; transition: opacity 0.12s; cursor: pointer; background: none; border: none; }
.task:hover .row-del { opacity: 0.7; }
.row-del:hover { opacity: 1; background: #fee2e2; border-radius: 4px; }
.outline-row-actions { display: none; gap: 4px; margin-left: 8px; }
.outline-row:hover .outline-row-actions { display: inline-flex; }
.outline-mini-btn { padding: 2px 8px; font-size: 11px; border-radius: 4px; background: #f1f5f9; color: #64748b; cursor: pointer; border: 1px solid transparent; font-family: inherit; }
.outline-mini-btn:hover { background: #e0e7ff; color: #4338ca; }
.outline-mini-btn.del:hover { background: #fee2e2; color: #b91c1c; }
.outline-add { margin-left: auto; padding: 3px 12px; background: #6366f1; color: #fff; border-radius: 5px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; }
.outline-add:hover { background: #4f46e5; }
.outline-proj-name { cursor: pointer; }
.outline-empty { padding: 12px 16px 12px 36px; font-size: 12px; color: #94a3b8; font-style: italic; }
.mm-card-add { position: absolute; right: 6px; top: 6px; width: 18px; height: 18px; border-radius: 50%; background: #6366f1; color: #fff; font-size: 12px; opacity: 0; transition: opacity 0.12s, transform 0.12s; padding: 0; line-height: 18px; text-align: center; cursor: pointer; font-weight: 700; z-index: 3; border: none; font-family: inherit; }
.mm-card:hover .mm-card-add { opacity: 1; }
.mm-card-add:hover { background: #4f46e5; transform: scale(1.15); }
.gantt-add-row { display: flex; align-items: center; padding: 10px 12px; gap: 12px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
.gantt-row-del { opacity: 0; margin-left: auto; padding: 2px 6px; font-size: 12px; cursor: pointer; background: none; border: none; }
.gantt-row:hover .gantt-row-del { opacity: 0.6; }
.gantt-row-del:hover { opacity: 1; }
.gantt-cell-add { cursor: cell; transition: background 0.1s; }
.gantt-cell-add:hover { background: #eef2ff; }
.gantt-hint { font-size: 11px; color: #94a3b8; }
.gantt-label { gap: 6px; }
.gantt-label .check { width: 16px; height: 16px; font-size: 10px; }
.gantt-label-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
.add-btn-inline { padding: 6px 12px; background: #6366f1; color: #fff; border-radius: 6px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; }
.add-btn-inline:hover { background: #4f46e5; }
.cal-cell-clickable { cursor: cell; transition: background 0.12s; }
.cal-cell-clickable:hover { background: #f8fafc; }
.cal-cell-clickable:hover .cal-add { opacity: 0.6; }
.cal-cell-clickable.today:hover { background: #ddd6fe; }
.cal-add { float: right; font-size: 11px; color: #94a3b8; opacity: 0; transition: opacity 0.12s; font-weight: 700; }
.cal-task { cursor: pointer; }
.cal-nav .gantt-hint { flex: 1; text-align: center; }

/* User switcher (로그인) */
.user-switcher { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 12px; cursor: pointer; transition: background 0.15s; }
.user-switcher:hover { background: rgba(255,255,255,0.08); }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0; }
.user-avatar.sm { width: 24px; height: 24px; font-size: 11px; }
.user-avatar.blue { background: #3b82f6; }
.user-avatar.purple { background: #a855f7; }
.user-avatar.pink { background: #ec4899; }
.user-avatar.green { background: #10b981; }
.user-avatar.orange { background: #f97316; }
.user-avatar.gray { background: #64748b; }
.user-info { flex: 1; min-width: 0; overflow: hidden; }
.user-name { font-size: 13px; font-weight: 600; color: #f1f5f9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-role { font-size: 10px; color: #94a3b8; }
.user-switcher-chev { color: #94a3b8; font-size: 11px; }
.user-menu { position: absolute; left: 16px; top: 130px; right: 16px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 6px; box-shadow: 0 12px 32px rgba(0,0,0,0.4); z-index: 50; }
.user-menu-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; cursor: pointer; color: #e2e8f0; width: 100%; text-align: left; border: none; background: none; }
.user-menu-item:hover { background: rgba(255,255,255,0.06); }
.user-menu-item.active { background: rgba(99,102,241,0.2); }
.user-menu-body { flex: 1; overflow: hidden; }
.user-menu-name { font-size: 12px; font-weight: 600; color: #f1f5f9; }
.user-menu-role { font-size: 10px; color: #94a3b8; }

/* "내 담당만" toggle */
.mine-toggle { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.3); border-radius: 6px; font-size: 12px; color: #a5b4fc; margin-bottom: 16px; cursor: pointer; width: 100%; }
.mine-toggle.on { background: #6366f1; color: #fff; border-color: #6366f1; }
.mine-toggle .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; opacity: 0.5; }
.mine-toggle.on .dot { opacity: 1; }

/* Auth screen (로그인 / 회원가입) */
.auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); padding: 20px; }
.auth-card { background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); padding: 40px; width: 100%; max-width: 420px; }
.auth-logo { text-align: center; margin-bottom: 16px; font-size: 48px; }
.auth-title { font-size: 26px; font-weight: 700; text-align: center; margin-bottom: 4px; }
.auth-sub { text-align: center; color: #64748b; font-size: 13px; margin-bottom: 28px; }
.auth-field { margin-bottom: 14px; }
.auth-field label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 6px; }
.auth-field input { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; font-family: inherit; box-sizing: border-box; }
.auth-field input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
.auth-btn { width: 100%; padding: 12px; background: #6366f1; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; font-family: inherit; }
.auth-btn:hover { background: #4f46e5; }
.auth-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
.auth-switch { text-align: center; margin-top: 20px; font-size: 13px; color: #64748b; }
.auth-switch a { color: #6366f1; font-weight: 600; cursor: pointer; }
.auth-switch a:hover { text-decoration: underline; }
.auth-error { background: #fee2e2; color: #b91c1c; padding: 10px 12px; border-radius: 6px; font-size: 12px; margin-bottom: 14px; }
.auth-hint { background: #eef2ff; color: #4338ca; padding: 10px 12px; border-radius: 6px; font-size: 11px; margin-top: 16px; text-align: center; line-height: 1.5; }

/* User info row (드롭다운 스위체 제거 대신) */
.user-info-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 8px; }
.logout-btn { width: 100%; padding: 6px 10px; background: transparent; color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; font-size: 11px; cursor: pointer; margin-bottom: 16px; font-family: inherit; }
.logout-btn:hover { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: #fca5a5; }

/* 담당자 표시 (모든 뷰 공통) */
.assignee-chip-mini { display: inline-flex; align-items: center; gap: 4px; padding: 1px 8px 1px 2px; border-radius: 12px; background: #eef2ff; color: #4338ca; font-size: 11px; font-weight: 500; }
.assignee-chip-mini .user-avatar { width: 16px; height: 16px; font-size: 9px; }
.assignee-chip-mini.empty { background: #f1f5f9; color: #94a3b8; opacity: 0.7; padding: 1px 8px; }
.outline-assignee { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: #475569; margin-right: 8px; max-width: 140px; overflow: hidden; }
.outline-assignee .user-avatar { width: 18px; height: 18px; font-size: 9px; flex-shrink: 0; }
.outline-assignee-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gantt-assignee { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; color: #64748b; flex-shrink: 0; max-width: 70px; overflow: hidden; }
.gantt-assignee .user-avatar { width: 14px; height: 14px; font-size: 8px; flex-shrink: 0; }
.gantt-assignee-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cal-assignee-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 3px; vertical-align: middle; }

/* DetailPanel 담당자 chips */
.assignee-picker { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; background: #fafafa; min-height: 44px; }
.assignee-pick { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px 4px 4px; border-radius: 14px; background: #fff; border: 1px solid #e2e8f0; font-size: 12px; cursor: pointer; transition: all 0.12s; font-family: inherit; color: #475569; }
.assignee-pick:hover { border-color: #c7d2fe; }
.assignee-pick.on { background: #eef2ff; border-color: #6366f1; color: #4338ca; font-weight: 600; }
.assignee-pick .user-avatar { width: 20px; height: 20px; font-size: 10px; }
.assignee-pick-empty { font-size: 11px; color: #94a3b8; padding: 6px 4px; }

우선순위?.select?.name || '보통',\n    due: p.마감일?.date?.start || '',\n    progress: p.진행률?.number || 0,\n    assignee: p.담당자?.people?.[0]?.name || '',\n    memberIds: (p['담당자 계정']?.relation || []).map(r => r.id),\n  };\n}\nfunction parseMember(row) {\n  const p = row.properties || {};\n  const rawName = p.이름?.title?.[0]?.plain_text || '팀원';\n  return {\n    id: row.id,\n    name: rawName.replace(/\\s*\\(.+\\)$/, ''),\n    email: p.이메일?.email || '',\n    role: p.역할?.select?.name || '조회자',\n    color: (p['프로필 색상']?.select?.name || 'blue').toLowerCase(),\n    password: p.비밀번호?.rich_text?.[0]?.plain_text || '',\n  };\n}\n\n// 태스크 → 담당자 멤버 객체 배열 (memberIds 우선, 없으면 assignee 이름으로 fallback)\nfunction assigneesOf(task, members) {\n  const ids = Array.isArray(task.memberIds) ? task.memberIds : [];\n  if (ids.length) {\n    return ids.map(id => members.find(m => m.id === id)).filter(Boolean);\n  }\n  if (task.assignee) {\n    const m = members.find(x => x.name === task.assignee);\n    if (m) return [m];\n    return [{ id: 'ghost-' + task.assignee, name: task.assignee, color: 'gray' }];\n  }\n  return [];\n}\n\n// ── Sidebar (뷰 + 프로젝트) ─────────────────────\nfunction Sidebar({ projects, tasks, currentUser, activeProj, onProj, view, onView, onAdd, showMineOnly, onToggleMine, onLogout }) {\n  const counts = useMemo(() => {\n    const m = { all: tasks.filter(t => t.status !== '완료').length };\n    projects.forEach(p => { m[p.id] = tasks.filter(t => t.projectId === p.id && t.status !== '완료').length; });\n    return m;\n  }, [projects, tasks]);\n  const views = [['dashboard', '📊 대시보드'], ['outline', '📝 토글 아웃라인'], ['mindmap', '🧠 마인드맵'], ['gantt', '📅 WBS 간트'], ['calendar', '🗓️ 캘린더']];\n  const cu = currentUser;\n  const initial = (cu.name || '?').slice(0, 1);\n  return (\n    <aside className=\"sidebar\">\n      <div className=\"brand\">\n        <div className=\"brand-logo\">📊</div>\n        <div>\n          <div className=\"brand-name\">Tasklens</div>\n          <div className=\"brand-sub\">하나의 데이터, 네 개의 시선</div>\n        </div>\n      </div>\n      <div className=\"user-info-row\">\n        <div className={'user-avatar ' + cu.color}>{initial}</div>\n        <div className=\"user-info\">\n          <div className=\"user-name\">{cu.name}</div>\n          <div className=\"user-role\">{cu.role} · {cu.email}</div>\n        </div>\n      </div>\n      <button className=\"logout-btn\" onClick={onLogout}>🚪 로그아웃</button>\n      <button className={'mine-toggle' + (showMineOnly ? ' on' : '')} onClick={onToggleMine}>\n        <span className=\"dot\" /> 내 담당만 보기\n      </button>\n      <div className=\"section-label\">뷰</div>\n      {views.map(v => (\n        <button key={v[0]} className={'proj-btn' + (view === v[0] ? ' active' : '')} onClick={() => onView(v[0])}>\n          <span className=\"proj-name\">{v[1]}</span>\n        </button>\n      ))}\n      <div className=\"section-label\">프로젝트</div>\n      <button className={'proj-btn' + (activeProj === 'all' ? ' active' : '')} onClick={() => onProj('all')}>\n        <span className=\"proj-dot gray\" /><span className=\"proj-name\">전체</span><span className=\"proj-count\">{counts.all}</span>\n      </button>\n      {projects.map(p => (\n        <button key={p.id} className={'proj-btn' + (activeProj === p.id ? ' active' : '')} onClick={() => onProj(p.id)}>\n          <span className={'proj-dot ' + p.color} /><span className=\"proj-name\">{p.name}</span><span className=\"proj-count\">{counts[p.id] || 0}</span>\n        </button>\n      ))}\n      <button className=\"add-btn\" onClick={onAdd}>＋ 새 태스크</button>\n    </aside>\n  );\n}\n\n// ── 1) 대시보드 뷰 (FilterBar가 외부에서 적용한 결과만 표시 + 담당자 칩 + 인라인 삭제) ──\nfunction DashboardView({ tasks, projectMap, members, onSelect, onToggleDone, onDelete }) {\n  const sorted = useMemo(() => [...tasks].sort((a, b) => (a.due || '9999').localeCompare(b.due || '9999')), [tasks]);\n  return (\n    <div className=\"task-list\">\n      {sorted.length === 0 ? <div className=\"empty\"><div className=\"empty-icon\">✨</div><div>표시할 태스크가 없어요</div></div> : sorted.map(t => {\n        const proj = projectMap[t.projectId]; const done = t.status === '완료';\n        const overdue = isOverdue(t.due, t.status);\n        const priCls = t.priority === '높음' ? 'high' : t.priority === '낮음' ? 'low' : 'mid';\n        const dueLabel = t.due === todayISO() ? '오늘' : t.due || '날짜 없음';\n        const assignees = assigneesOf(t, members);\n        return (\n          <div key={t.id} className={'task' + (done ? ' done' : '')}>\n            <button className={'check' + (done ? ' on' : '')} onClick={(e) => { e.stopPropagation(); onToggleDone(t); }}>{done ? '✓' : ''}</button>\n            <div className=\"task-body\" onClick={() => onSelect(t)}>\n              <div className=\"task-title\">{t.title}</div>\n              <div className=\"task-meta\">\n                <span className=\"task-proj\"><span className={'proj-dot ' + (proj?.color || 'gray')} />{proj?.name || '프로젝트 없음'}</span>\n                <span>·</span><span className={'task-due' + (overdue ? ' overdue' : '')}>{dueLabel}</span>\n                <span className={'pri ' + priCls}>{t.priority}</span>\n                {assignees.length > 0 ? assignees.map(m => (\n                  <span key={m.id} className=\"assignee-chip-mini\" title={m.email || m.name}>\n                    <span className={'user-avatar sm ' + (m.color || 'gray')}>{(m.name || '?').slice(0,1)}</span>{m.name}\n                  </span>\n                )) : <span className=\"assignee-chip-mini empty\">미배정</span>}\n              </div>\n            </div>\n            <button className=\"row-del\" onClick={e => { e.stopPropagation(); onDelete(t.id); }} title=\"삭제\">🗑</button>\n          </div>\n        );\n      })}\n    </div>\n  );\n}\n\n// ── 2) 토글 아웃라인 뷰 (인라인 ＋서브 / 🗑 + 프로젝트별 ＋태스크) ──\nfunction OutlineRow({ task, tasks, depth, members, onSelect, onToggleDone, onAdd, onDelete }) {\n  const [open, setOpen] = useState(true);\n  const children = tasks.filter(t => t.parentId === task.id);\n  const done = task.status === '완료';\n  const assignees = assigneesOf(task, members);\n  return (\n    <>\n      <div className={'outline-row' + (depth > 0 ? ' indent' : '') + (done ? ' done' : '')}>\n        {children.length > 0 ? <span className=\"outline-toggle\" onClick={() => setOpen(!open)}>{open ? '▾' : '▸'}</span> : <span className=\"outline-toggle\" />}\n        <button className={'check' + (done ? ' on' : '')} onClick={() => onToggleDone(task)}>{done ? '✓' : ''}</button>\n        <div className=\"outline-title\" onClick={() => onSelect(task)}>{task.title}</div>\n        {assignees.length > 0 && (\n          <span className=\"outline-assignee\" title={assignees.map(m => m.name).join(', ')}>\n            <span className={'user-avatar ' + (assignees[0].color || 'gray')}>{(assignees[0].name || '?').slice(0,1)}</span>\n            <span className=\"outline-assignee-name\">{assignees.map(m => m.name).join(', ')}</span>\n          </span>\n        )}\n        <div className=\"outline-meta\">{task.due === todayISO() ? '오늘' : (task.due || '—')} · {task.priority}</div>\n        <div className=\"outline-row-actions\">\n          <button className=\"outline-mini-btn\" title=\"서브태스크 추가\" onClick={e => { e.stopPropagation(); onAdd({ projectId: task.projectId, parentId: task.id }); }}>＋ 서브</button>\n          <button className=\"outline-mini-btn del\" title=\"삭제\" onClick={e => { e.stopPropagation(); onDelete(task.id); }}>🗑</button>\n        </div>\n      </div>\n      {open && children.map(c => <OutlineRow key={c.id} task={c} tasks={tasks} depth={depth+1} members={members} onSelect={onSelect} onToggleDone={onToggleDone} onAdd={onAdd} onDelete={onDelete} />)}\n    </>\n  );\n}\nfunction OutlineGroup({ project, tasks, members, onSelect, onToggleDone, onAdd, onDelete }) {\n  const [open, setOpen] = useState(true);\n  const all = tasks.filter(t => t.projectId === project.id);\n  const roots = all.filter(t => !t.parentId);\n  const doneCount = all.filter(t => t.status === '완료').length;\n  return (\n    <div className=\"outline-group\">\n      <div className=\"outline-proj\">\n        <span className=\"outline-toggle\" onClick={() => setOpen(!open)}>{open ? '▾' : '▸'}</span>\n        <span className={'proj-dot ' + project.color} />\n        <span className=\"outline-proj-name\" onClick={() => setOpen(!open)}>{project.name}</span>\n        <span className=\"outline-meta\">{doneCount}/{all.length} 완료</span>\n        <button className=\"outline-add\" onClick={e => { e.stopPropagation(); onAdd({ projectId: project.id }); }}>＋ 태스크</button>\n      </div>\n      {open && (all.length === 0 ? <div className=\"outline-empty\">아직 태스크가 없어요. 우측 ＋ 버튼으로 추가하세요.</div> : roots.map(t => <OutlineRow key={t.id} task={t} tasks={tasks} depth={0} members={members} onSelect={onSelect} onToggleDone={onToggleDone} onAdd={onAdd} onDelete={onDelete} />))}\n    </div>\n  );\n}\nfunction OutlineView({ projects, tasks, members, onSelect, onToggleDone, onAdd, onDelete }) {\n  return (\n    <div className=\"outline\">\n      {projects.map(p => <OutlineGroup key={p.id} project={p} tasks={tasks} members={members} onSelect={onSelect} onToggleDone={onToggleDone} onAdd={onAdd} onDelete={onDelete} />)}\n    </div>\n  );\n}\n\n// ── 3) 마인드맵 뷰 (가로 트리 · 카드형) ─────────\nfunction MindmapView({ projects, tasks, activeProj, projectMap, onSelect, onToggleDone, onAdd }) {\n  const CARD_W = 230, CARD_H = 72, COL_GAP = 60, ROW_GAP = 10;\n  const buildTaskNode = (t, all) => ({\n    id: t.id, kind: 'task', task: t,\n    children: all.filter(c => c.parentId === t.id).map(c => buildTaskNode(c, all)),\n  });\n  let tree;\n  if (activeProj === 'all') {\n    tree = {\n      id: 'root-all', kind: 'root', label: '전체 업무',\n      children: projects.map(p => ({\n        id: 'proj-' + p.id, kind: 'project', project: p,\n        children: tasks.filter(t => t.projectId === p.id && !t.parentId).map(t => buildTaskNode(t, tasks)),\n      })),\n    };\n  } else {\n    const p = projectMap[activeProj];\n    if (!p) return <div className=\"mindmap-wrap\"><div className=\"empty\"><div className=\"empty-icon\">🧠</div><div>프로젝트를 선택해주세요</div></div></div>;\n    tree = {\n      id: 'proj-' + p.id, kind: 'root', label: p.name, project: p,\n      children: tasks.filter(t => t.projectId === p.id && !t.parentId).map(t => buildTaskNode(t, tasks)),\n    };\n  }\n  if (!tree.children.length) {\n    return <div className=\"mindmap-wrap\"><div className=\"empty\"><div className=\"empty-icon\">🧠</div><div>표시할 태스크가 없어요</div></div></div>;\n  }\n  let yCursor = 16;\n  const layout = (node, depth) => {\n    node.depth = depth;\n    node.x = 20 + depth * (CARD_W + COL_GAP);\n    if (!node.children || !node.children.length) {\n      node.y = yCursor;\n      yCursor += CARD_H + ROW_GAP;\n    } else {\n      node.children.forEach(c => layout(c, depth + 1));\n      const first = node.children[0], last = node.children[node.children.length - 1];\n      node.y = (first.y + last.y) / 2;\n    }\n  };\n  layout(tree, 0);\n  const flat = [];\n  const edges = [];\n  const walk = (n) => { flat.push(n); (n.children || []).forEach(c => { edges.push({ from: n, to: c }); walk(c); }); };\n  walk(tree);\n  const maxDepth = Math.max(...flat.map(n => n.depth));\n  const totalW = 40 + (maxDepth + 1) * (CARD_W + COL_GAP);\n  const totalH = Math.max(yCursor + 16, 360);\n  const setPos = (el, n) => { if (el) { el.style.left = n.x + 'px'; el.style.top = n.y + 'px'; el.style.width = CARD_W + 'px'; el.style.minHeight = CARD_H + 'px'; } };\n  const setBar = (el, pct) => { if (el) el.style.width = (pct || 0) + '%'; };\n  const setCanvas = (el) => { if (el) { el.style.width = totalW + 'px'; el.style.height = totalH + 'px'; } };\n  const trunc = (s, n) => (s || '').length > n ? (s || '').slice(0, n) + '…' : (s || '');\n  return (\n    <div className=\"mindmap-wrap\">\n      <div className=\"mm-legend\">🧠 가로 트리 · 루트 → 프로젝트 → 태스크 → 서브태스크 · 카드 클릭 편집 · 체크박스로 완료 토글</div>\n      <div className=\"mindmap-canvas\" ref={setCanvas}>\n        <svg className=\"mm-lines\" width={totalW} height={totalH}>\n          {edges.map((e, i) => {\n            const x1 = e.from.x + CARD_W, y1 = e.from.y + CARD_H / 2;\n            const x2 = e.to.x, y2 = e.to.y + CARD_H / 2;\n            const mx = (x1 + x2) / 2;\n            const t = e.to.task;\n            const cls = t && t.status === '완료' ? ' done' : (t && t.priority === '높음' ? ' high' : '');\n            return <path key={i} className={'mm-link-path' + cls} d={'M' + x1 + ',' + y1 + ' C' + mx + ',' + y1 + ' ' + mx + ',' + y2 + ' ' + x2 + ',' + y2} />;\n          })}\n        </svg>\n        {flat.map(n => {\n          if (n.kind === 'root') {\n            const cnt = tasks.filter(t => n.project ? t.projectId === n.project.id : true).length;\n            return (\n              <div key={n.id} className=\"mm-card mm-root-card\" ref={el => setPos(el, n)}>\n                <div className=\"mm-root-label\">{trunc(n.label, 14)}</div>\n                <div className=\"mm-root-sub\">{activeProj === 'all' ? (projects.length + ' 프로젝트 · ' + tasks.length + ' 태스크') : (cnt + ' 태스크')}</div>\n              </div>\n            );\n          }\n          if (n.kind === 'project') {\n            const p = n.project;\n            const all = tasks.filter(t => t.projectId === p.id);\n            const doneCnt = all.filter(t => t.status === '완료').length;\n            const pct = all.length ? Math.round(doneCnt * 100 / all.length) : 0;\n            return (\n              <div key={n.id} className=\"mm-card mm-project-card\" ref={el => setPos(el, n)}>\n                <div className=\"mm-card-head\">\n                  <span className={'proj-dot ' + p.color} />\n                  <div className=\"mm-card-title\"><b>{p.name}</b></div>\n                </div>\n                <div className=\"mm-card-meta\">\n                  <span className=\"mm-card-date\">📁 {all.length}건</span>\n                  <div className=\"mm-card-progress\"><div className=\"mm-card-progress-bar\" ref={el => setBar(el, pct)} /></div>\n                  <span className=\"mm-card-pct\">{pct}%</span>\n                </div>\n                <button className=\"mm-card-add\" onClick={e => { e.stopPropagation(); onAdd({ projectId: p.id }); }} title=\"태스크 추가\">＋</button>\n              </div>\n            );\n          }\n          const t = n.task;\n          const done = t.status === '완료';\n          const dueLabel = t.due ? t.due.slice(5).replace('-', '/') : '';\n          const priCls = t.priority === '높음' ? ' high' : '';\n          return (\n            <div key={n.id} className={'mm-card mm-task-card' + (done ? ' done' : '') + priCls} ref={el => setPos(el, n)} onClick={() => onSelect(t)}>\n              <div className=\"mm-card-head\">\n                <button className={'mm-card-check' + (done ? ' on' : '')} onClick={e => { e.stopPropagation(); onToggleDone(t); }}>{done ? '✓' : ''}</button>\n                <div className={'mm-card-title' + (done ? ' strike' : '')}>{t.title}</div>\n              </div>\n              <div className=\"mm-card-meta\">\n                {dueLabel && <span className=\"mm-card-date\">🗓 {dueLabel}</span>}\n                <div className=\"mm-card-progress\"><div className={'mm-card-progress-bar' + (done ? ' done' : '')} ref={el => setBar(el, t.progress)} /></div>\n                <span className=\"mm-card-pct\">{t.progress || 0}%</span>\n              </div>\n              {t.assignee && <div className=\"mm-card-assignee\">👤 {t.assignee}</div>}\n              <button className=\"mm-card-add\" onClick={e => { e.stopPropagation(); onAdd({ projectId: t.projectId, parentId: t.id }); }} title=\"서브태스크 추가\">＋</button>\n            </div>\n          );\n        })}\n      </div>\n    </div>\n  );\n}\n\n// ── 4) WBS 간트 뷰 (체크 토글 + 빈 칸 클릭 추가 + 인라인 삭제) ──\nfunction GanttView({ tasks, projectMap, members, onSelect, onToggleDone, onAdd, onDelete }) {\n  const start = addDays(todayISO(), -3);\n  const days = Array.from({length: 21}, (_, i) => addDays(start, i));\n  const today = todayISO();\n  const visibleTasks = tasks.filter(t => t.due).sort((a,b) => a.due.localeCompare(b.due));\n  return (\n    <div className=\"gantt\">\n      <div className=\"gantt-add-row\">\n        <button className=\"add-btn-inline\" onClick={() => onAdd({})}>＋ 새 태스크</button>\n        <span className=\"gantt-hint\">💡 빈 칸 클릭 = 해당 날짜 마감으로 새 태스크 · 라벨 좌측 체크 = 완료</span>\n      </div>\n      <div className=\"gantt-table\">\n        <div className=\"gantt-header\">\n          <div className=\"gantt-spacer\">태스크</div>\n          {days.map(d => {\n            const dt = new Date(d); const dow = dt.getDay();\n            return <div key={d} className={'gantt-day' + ((dow === 0 || dow === 6) ? ' weekend' : '') + (d === today ? ' today' : '')}>{(dt.getMonth()+1) + '/' + dt.getDate()}</div>;\n          })}\n        </div>\n        {visibleTasks.length === 0 ? <div className=\"empty\"><div className=\"empty-icon\">📅</div><div>마감일이 있는 태스크가 없어요 — 위 ＋ 또는 빈 칸을 클릭하세요</div></div> : visibleTasks.map(t => {\n          const proj = projectMap[t.projectId];\n          const idx = days.indexOf(t.due);\n          const span = 3;\n          const startIdx = Math.max(0, idx - span + 1);\n          const width = idx >= 0 ? (idx - startIdx + 1) * 40 - 4 : 36;\n          const left = startIdx * 40 + 2;\n          const priCls = t.priority === '높음' ? 'high' : t.priority === '낮음' ? 'low' : 'mid';\n          const done = t.status === '완료';\n          return (\n            <div key={t.id} className=\"gantt-row\">\n              <div className=\"gantt-label\">\n                <button className={'check' + (done ? ' on' : '')} onClick={e => { e.stopPropagation(); onToggleDone(t); }}>{done ? '✓' : ''}</button>\n                {proj && <span className={'proj-dot ' + proj.color} />}\n                <span className=\"gantt-label-title\" onClick={() => onSelect(t)}>{t.title}</span>\n                {(() => { const a = assigneesOf(t, members); return a.length > 0 ? <span className=\"gantt-assignee\" title={a.map(m => m.name).join(', ')}><span className={'user-avatar ' + (a[0].color || 'gray')}>{(a[0].name || '?').slice(0,1)}</span><span className=\"gantt-assignee-name\">{a[0].name}{a.length > 1 ? ' +' + (a.length-1) : ''}</span></span> : null; })()}\n                <button className=\"gantt-row-del\" onClick={e => { e.stopPropagation(); onDelete(t.id); }} title=\"삭제\">🗑</button>\n              </div>\n              <div className=\"gantt-track\">\n                {days.map(d => {\n                  const dt = new Date(d); const dow = dt.getDay();\n                  return <div key={d} className={'gantt-cell gantt-cell-add' + ((dow === 0 || dow === 6) ? ' weekend' : '')} onClick={() => onAdd({ due: d })} />;\n                })}\n                {idx >= 0 && <div className={'gantt-bar ' + priCls + (done ? ' done' : '')} ref={el => { if (el) { el.style.left = left + 'px'; el.style.width = width + 'px'; } }} onClick={e => { e.stopPropagation(); onSelect(t); }}>{t.title}</div>}\n              </div>\n            </div>\n          );\n        })}\n      </div>\n    </div>\n  );\n}\n\n// ── 5) 캘린더 뷰 (셀 클릭 = 해당 날짜로 새 태스크) ──\nfunction CalendarView({ tasks, onSelect, onAdd, onToggleDone }) {\n  const [month, setMonth] = useState(() => { const d = new Date(); return { y: d.getFullYear(), m: d.getMonth() }; });\n  const firstDow = new Date(month.y, month.m, 1).getDay();\n  const daysInMonth = new Date(month.y, month.m + 1, 0).getDate();\n  const cells = [];\n  for (let i = 0; i < firstDow; i++) cells.push(null);\n  for (let d = 1; d <= daysInMonth; d++) cells.push(d);\n  while (cells.length % 7 !== 0) cells.push(null);\n  const tasksByDate = useMemo(() => {\n    const m = {};\n    tasks.forEach(t => { if (t.due) { (m[t.due] = m[t.due] || []).push(t); } });\n    return m;\n  }, [tasks]);\n  const today = todayISO();\n  const prev = () => setMonth(p => p.m === 0 ? { y: p.y-1, m: 11 } : { y: p.y, m: p.m-1 });\n  const next = () => setMonth(p => p.m === 11 ? { y: p.y+1, m: 0 } : { y: p.y, m: p.m+1 });\n  return (\n    <div className=\"cal\">\n      <div className=\"cal-nav\">\n        <button className=\"cal-nav-btn\" onClick={prev}>◀</button>\n        <div className=\"cal-month\">{month.y}년 {month.m+1}월</div>\n        <span className=\"gantt-hint\">💡 빈 셀 클릭 = 새 태스크 · 태스크 클릭 = 편집 · 더블클릭 = 완료</span>\n        <button className=\"cal-nav-btn\" onClick={next}>▶</button>\n      </div>\n      <div className=\"cal-head\">\n        {['일','월','화','수','목','금','토'].map(d => <div key={d} className=\"cal-dow\">{d}</div>)}\n      </div>\n      <div className=\"cal-grid\">\n        {cells.map((d, i) => {\n          if (d === null) return <div key={i} className=\"cal-cell other\" />;\n          const ds = month.y + '-' + String(month.m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');\n          const dayTasks = tasksByDate[ds] || [];\n          return (\n            <div key={i} className={'cal-cell cal-cell-clickable' + (ds === today ? ' today' : '')} onClick={() => onAdd({ due: ds })}>\n              <div className=\"cal-day\">{d}<span className=\"cal-add\">＋</span></div>\n              {dayTasks.slice(0, 3).map(t => {\n                const cls = t.status === '완료' ? 'done' : t.priority === '높음' ? 'high' : '';\n                return <div key={t.id} className={'cal-task ' + cls} onClick={e => { e.stopPropagation(); onSelect(t); }} onDoubleClick={e => { e.stopPropagation(); onToggleDone(t); }}>{t.status === '완료' ? '✓ ' : ''}{t.title}</div>;\n              })}\n              {dayTasks.length > 3 && <div className=\"cal-task\" onClick={e => e.stopPropagation()}>+{dayTasks.length - 3} 더보기</div>}\n            </div>\n          );\n        })}\n      </div>\n    </div>\n  );\n}\n\n// ── Detail panel (CRUD UI) ─────────────────────\nfunction DetailPanel({ task, projects, members, onClose, onSave, onDelete }) {\n  const [form, setForm] = useState(task);\n  useEffect(() => setForm(task), [task]);\n  const upd = (k, v) => setForm(p => ({ ...p, [k]: v }));\n  const isNew = String(form.id || '').startsWith('new-');\n  const selectedIds = Array.isArray(form.memberIds) ? form.memberIds : [];\n  const toggleMember = (id) => {\n    setForm(p => {\n      const cur = Array.isArray(p.memberIds) ? p.memberIds : [];\n      const next = cur.includes(id) ? cur.filter(x => x !== id) : [...cur, id];\n      const names = next.map(mid => (members.find(m => m.id === mid) || {}).name).filter(Boolean).join(', ');\n      return { ...p, memberIds: next, assignee: names };\n    });\n  };\n  return (\n    <>\n      <div className=\"detail-overlay\" onClick={onClose} />\n      <div className=\"detail\">\n        <button className=\"detail-close\" onClick={onClose}>✕</button>\n        <h3>{isNew ? '새 태스크' : '태스크 편집'}</h3>\n        <div className=\"detail-field\"><label className=\"detail-label\">제목</label><input className=\"detail-input\" value={form.title} onChange={e => upd('title', e.target.value)} placeholder=\"태스크 제목\" /></div>\n        <div className=\"detail-field\"><label className=\"detail-label\">프로젝트</label>\n          <select className=\"detail-select\" value={form.projectId} onChange={e => upd('projectId', e.target.value)}>\n            <option value=\"\">— 선택 —</option>\n            {projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}\n          </select>\n        </div>\n        <div className=\"detail-field\"><label className=\"detail-label\">담당자 (여러 명 선택 가능)</label>\n          <div className=\"assignee-picker\">\n            {members.length === 0 ? <span className=\"assignee-pick-empty\">팀원이 없어요</span> : members.map(m => {\n              const on = selectedIds.includes(m.id);\n              return (\n                <button key={m.id} className={'assignee-pick' + (on ? ' on' : '')} onClick={() => toggleMember(m.id)} type=\"button\">\n                  <span className={'user-avatar ' + (m.color || 'gray')}>{(m.name || '?').slice(0,1)}</span>\n                  {m.name}\n                </button>\n              );\n            })}\n          </div>\n        </div>\n        <div className=\"detail-field\"><label className=\"detail-label\">상태</label>\n          <select className=\"detail-select\" value={form.status} onChange={e => upd('status', e.target.value)}>\n            <option>할일</option><option>진행중</option><option>완료</option>\n          </select>\n        </div>\n        <div className=\"detail-field\"><label className=\"detail-label\">우선순위</label>\n          <select className=\"detail-select\" value={form.priority} onChange={e => upd('priority', e.target.value)}>\n            <option>높음</option><option>보통</option><option>낮음</option>\n          </select>\n        </div>\n        <div className=\"detail-field\"><label className=\"detail-label\">마감일</label><input className=\"detail-input\" type=\"date\" value={form.due} onChange={e => upd('due', e.target.value)} /></div>\n        <div className=\"detail-field\"><label className=\"detail-label\">진행률 (0-100)</label><input className=\"detail-input\" type=\"number\" min=\"0\" max=\"100\" value={form.progress} onChange={e => upd('progress', Number(e.target.value))} /></div>\n        <div className=\"detail-actions\">\n          <button className=\"btn btn-primary\" onClick={() => onSave(form)}>{isNew ? '생성' : '저장'}</button>\n          {!isNew && <button className=\"btn btn-danger\" onClick={() => onDelete(form.id)}>삭제</button>}\n          <button className=\"btn btn-secondary\" onClick={onClose}>닫기</button>\n        </div>\n      </div>\n    </>\n  );\n}\n\n// ── App ─────────────────────────────────────────\nfunction AuthScreen({ onLogin, onSignup }) {\n  const [mode, setMode] = useState('login');\n  const [email, setEmail] = useState('');\n  const [password, setPassword] = useState('');\n  const [name, setName] = useState('');\n  const [error, setError] = useState('');\n  const [busy, setBusy] = useState(false);\n  const submit = async () => {\n    setError('');\n    if (!email || !password) { setError('이메일과 비밀번호를 입력해주세요'); return; }\n    if (mode === 'signup' && !name) { setError('이름을 입력해주세요'); return; }\n    setBusy(true);\n    try {\n      if (mode === 'login') await onLogin(email, password);\n      else await onSignup(name, email, password);\n    } catch (e) { setError(e.message || '처리 중 오류'); }\n    finally { setBusy(false); }\n  };\n  return (\n    <div className=\"auth-screen\">\n      <div className=\"auth-card\">\n        <div className=\"auth-logo\">📊</div>\n        <div className=\"auth-title\">Tasklens</div>\n        <div className=\"auth-sub\">{mode === 'login' ? '이메일로 로그인' : '새 계정 만들기'}</div>\n        {error && <div className=\"auth-error\">{error}</div>}\n        {mode === 'signup' && (\n          <div className=\"auth-field\"><label>이름</label><input value={name} onChange={e => setName(e.target.value)} placeholder=\"홍길동\" /></div>\n        )}\n        <div className=\"auth-field\"><label>이메일</label><input type=\"email\" value={email} onChange={e => setEmail(e.target.value)} placeholder=\"you@example.com\" autoComplete=\"email\" /></div>\n        <div className=\"auth-field\"><label>비밀번호</label><input type=\"password\" value={password} onChange={e => setPassword(e.target.value)} placeholder=\"••••••••\" onKeyDown={e => e.key === 'Enter' && submit()} autoComplete=\"current-password\" /></div>\n        <button className=\"auth-btn\" onClick={submit} disabled={busy}>{busy ? '처리 중...' : mode === 'login' ? '로그인' : '가입하기'}</button>\n        <div className=\"auth-switch\">\n          {mode === 'login' ? (<>계정이 없으신가요? <a onClick={() => { setMode('signup'); setError(''); }}>가입하기</a></>) : (<>이미 계정이 있으신가요? <a onClick={() => { setMode('login'); setError(''); }}>로그인</a></>)}\n        </div>\n        <div className=\"auth-hint\">💡 프리뷰 기본 계정: miri@orot-ai.com / 1234</div>\n      </div>\n    </div>\n  );\n}\n\nfunction App() {\n  const [projects, setProjects] = useState(FALLBACK_PROJECTS);\n  const [tasks, setTasks] = useState(FALLBACK_TASKS);\n  const [members, setMembers] = useState(FALLBACK_MEMBERS);\n  const [currentUserId, setCurrentUserId] = useState(() => { try { return localStorage.getItem('tasklens_user') || ''; } catch (e) { return ''; } });\n  const [showMineOnly, setShowMineOnly] = useState(false);\n  const [activeProj, setActiveProj] = useState('all');\n  const [view, setView] = useState('dashboard');\n  const [filterTab, setFilterTab] = useState('all');\n  const [selected, setSelected] = useState(null);\n  const [source, setSource] = useState('⚪ Fallback 데이터');\n  const [toast, setToast] = useState(null);\n\n  const showToast = useCallback((msg, kind) => { setToast({ msg, kind }); setTimeout(() => setToast(null), 2500); }, []);\n\n  const reload = useCallback(async () => {\n    try {\n      const [pRes, tRes, mRes] = await Promise.all([queryDb(PROJECTS_DB_ID), queryDb(TASKS_DB_ID), queryDb(MEMBERS_DB_ID)]);\n      const pp = (pRes.results || []).map(parseProject);\n      const tt = (tRes.results || []).map(parseTask);\n      const mm = (mRes.results || []).map(parseMember);\n      if (pp.length) setProjects(pp);\n      if (tt.length) setTasks(tt);\n      if (mm.length) setMembers(mm);\n      if (pp.length || tt.length || mm.length) setSource('🟢 노션 DB 연동 중 (4개 DB)');\n    } catch (e) { /* Fallback 유지 */ }\n  }, []);\n\n  useEffect(() => { reload(); }, [reload]);\n\n  const currentUser = useMemo(() => members.find(m => m.id === currentUserId) || null, [members, currentUserId]);\n  const projectMap = useMemo(() => { const m = {}; projects.forEach(p => m[p.id] = p); return m; }, [projects]);\n\n  // 프로젝트 + \"내 담당\" 필터까지 적용한 base (FilterBar 카운트용)\n  const baseTasks = useMemo(() => {\n    let l = tasks;\n    if (activeProj !== 'all') l = l.filter(t => t.projectId === activeProj);\n    if (showMineOnly && currentUser) {\n      l = l.filter(t => (Array.isArray(t.memberIds) && t.memberIds.includes(currentUser.id)) || (t.assignee && t.assignee === currentUser.name));\n    }\n    return l;\n  }, [tasks, activeProj, showMineOnly, currentUser]);\n\n  // 필터탭까지 적용한 최종 (모든 뷰가 써먹는 데이터)\n  const filteredTasks = useMemo(() => {\n    let l = baseTasks;\n    if (filterTab === 'today') l = l.filter(t => t.status !== '완료' && t.due === todayISO());\n    else if (filterTab === 'week') l = l.filter(t => t.status !== '완료' && isThisWeek(t.due));\n    else if (filterTab === 'overdue') l = l.filter(t => isOverdue(t.due, t.status));\n    else if (filterTab === 'done') l = l.filter(t => t.status === '완료');\n    return l;\n  }, [baseTasks, filterTab]);\n\n  const filterCounts = useMemo(() => ({\n    all: baseTasks.length,\n    today: baseTasks.filter(t => t.status !== '완료' && t.due === todayISO()).length,\n    week: baseTasks.filter(t => t.status !== '완료' && isThisWeek(t.due)).length,\n    overdue: baseTasks.filter(t => isOverdue(t.due, t.status)).length,\n    done: baseTasks.filter(t => t.status === '완료').length,\n  }), [baseTasks]);\n\n  const overdue = filteredTasks.filter(t => isOverdue(t.due, t.status)).length;\n\n  const login = useCallback(async (email, password) => {\n    const m = members.find(x => (x.email || '').toLowerCase() === email.toLowerCase());\n    if (!m) throw new Error('가입되지 않은 이메일입니다');\n    if (m.password !== password) throw new Error('비밀번호가 일치하지 않습니다');\n    setCurrentUserId(m.id);\n    try { localStorage.setItem('tasklens_user', m.id); } catch (e) {}\n    showToast('환영합니다, ' + m.name + '님', 'success');\n  }, [members, showToast]);\n\n  const signup = useCallback(async (name, email, password) => {\n    if (members.some(x => (x.email || '').toLowerCase() === email.toLowerCase())) {\n      throw new Error('이미 가입된 이메일입니다');\n    }\n    const colors = ['blue', 'purple', 'pink', 'green', 'orange'];\n    const color = colors[members.length % colors.length];\n    const tempId = 'new-' + Date.now();\n    const newMember = { id: tempId, name, email, password, role: '조회자', color };\n    setMembers(prev => [...prev, newMember]);\n    let finalId = tempId;\n    try {\n      const r = await createMemberApi({\n        이름: propTitle(name),\n        이메일: propEmail(email),\n        비밀번호: propRichText(password),\n        역할: propSelect('조회자'),\n        '프로필 색상': propSelect(color),\n      });\n      finalId = r.id || tempId;\n      setMembers(prev => prev.map(x => x.id === tempId ? { ...x, id: finalId } : x));\n    } catch (e) { /* 로컬만 반영 */ }\n    setCurrentUserId(finalId);\n    try { localStorage.setItem('tasklens_user', finalId); } catch (e) {}\n    showToast('가입 완료! 환영합니다, ' + name + '님', 'success');\n  }, [members, showToast]);\n\n  const logout = useCallback(() => {\n    setCurrentUserId('');\n    try { localStorage.removeItem('tasklens_user'); } catch (e) {}\n  }, []);\n\n  const onToggleDone = useCallback(async (t) => {\n    const nowDone = t.status !== '완료';\n    const next = { ...t, status: nowDone ? '완료' : '진행중', progress: nowDone ? 100 : 50 };\n    setTasks(prev => prev.map(x => x.id === t.id ? next : x));\n    try {\n      await patchPageApi(t.id, { 상태: propStatus(next.status), 진행률: propNumber(next.progress) });\n      showToast(nowDone ? '완료 처리됨' : '재시작', 'success');\n    } catch (e) {\n      setTasks(prev => prev.map(x => x.id === t.id ? t : x));\n      showToast('저장 실패 — 노션 연결 확인', 'error');\n    }\n  }, [showToast]);\n\n  const onSave = useCallback(async (f) => {\n    const isNew = String(f.id).startsWith('new-');\n    if (!f.title) { showToast('제목 입력 필요', 'error'); return; }\n    const validMemberIds = (f.memberIds || []).filter(id => id && !String(id).startsWith('new-') && !String(id).startsWith('ghost-'));\n    const props = {\n      이름: propTitle(f.title),\n      상태: propStatus(f.status),\n      우선순위: propSelect(f.priority),\n      마감일: propDate(f.due),\n      진행률: propNumber(f.progress),\n      프로젝트: propRel(f.projectId),\n      '담당자 계정': { relation: validMemberIds.map(id => ({ id })) },\n    };\n    try {\n      if (isNew) {\n        const r = await createTaskApi(props);\n        setTasks(prev => [...prev, { ...f, id: r.id || f.id }]);\n        showToast('태스크 생성됨', 'success');\n      } else {\n        await patchPageApi(f.id, props);\n        setTasks(prev => prev.map(x => x.id === f.id ? f : x));\n        showToast('저장됨', 'success');\n      }\n    } catch (e) {\n      // 낙관적 반영 (Fallback 모드)\n      if (isNew) setTasks(prev => [...prev, f]);\n      else setTasks(prev => prev.map(x => x.id === f.id ? f : x));\n      showToast('노션 저장 실패 (로컬만 반영)', 'error');\n    }\n    setSelected(null);\n  }, [showToast]);\n\n  const onDelete = useCallback(async (id) => {\n    if (!window.confirm('정말 삭제할까요?')) return;\n    setTasks(prev => prev.filter(x => x.id !== id));\n    try { await archiveApi(id); showToast('삭제됨', 'success'); }\n    catch (e) { showToast('노션 삭제 실패 (로컬만 반영)', 'error'); }\n    setSelected(null);\n  }, [showToast]);\n\n  const onAdd = useCallback((prefill) => {\n    const pf = prefill || {};\n    setSelected({\n      id: 'new-' + Date.now(),\n      title: '',\n      projectId: pf.projectId != null ? pf.projectId : (activeProj === 'all' ? '' : activeProj),\n      parentId: pf.parentId || '',\n      status: '할일',\n      priority: '보통',\n      due: pf.due || todayISO(),\n      progress: 0,\n      assignee: currentUser?.name || '',\n      memberIds: currentUser ? [currentUser.id] : [],\n    });\n  }, [activeProj, currentUser]);\n\n  const filterTabsDef = [['all', '전체'], ['today', '오늘'], ['week', '이번 주'], ['overdue', '🔥 지연'], ['done', '✓ 완료']];\n\n  const projName = activeProj === 'all' ? '전체 프로젝트' : (projectMap[activeProj]?.name || '');\n  const viewLabels = { dashboard: '📊 대시보드', outline: '📝 토글 아웃라인', mindmap: '🧠 마인드맵', gantt: '📅 WBS 간트', calendar: '🗓️ 캘린더' };\n\n  if (!currentUser) {\n    return <><AuthScreen onLogin={login} onSignup={signup} />{toast && <div className={'toast ' + (toast.kind || '')}>{toast.msg}</div>}</>;\n  }\n\n  return (\n    <div className=\"app\">\n      <Sidebar projects={projects} tasks={tasks} currentUser={currentUser} activeProj={
